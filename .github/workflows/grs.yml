name: Update README cards

on:
  schedule:
    - cron: "0 3 * * *"  # 每天3点自动更新（UTC时间）
  workflow_dispatch:      # 支持手动触发

# 显式声明工作流需要的权限（关键修复1）
permissions:
  contents: write  # 授予写入仓库内容的权限

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false  # 禁用默认凭证（关键修复2）
          fetch-depth: 0  # 拉取完整仓库历史，避免提交冲突

      - name: Generate stats card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          options: username=${{ github.repository_owner }}&show_icons=true&theme=transparent
          path: profile/stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate top languages card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: top-langs
          options: username=${{ github.repository_owner }}&layout=compact&langs_count=8
          path: profile/top-langs.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit & push cards（关键修复3）
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          mkdir -p profile
          git add profile/*.svg
          git commit -m "Update README cards" || exit 0  # 无变更时不报错
          # 使用带令牌的URL推送，解决权限验证问题
          git push https://${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git HEAD:main
